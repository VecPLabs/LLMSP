<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLMSP // Swarm Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #eeeadf;
    --bg-2: #e4dfd1;
    --panel: #f5f1e6;
    --panel-2: #ebe5d4;
    --ink: #1a1713;
    --ink-2: #3a342a;
    --ink-3: #6b6355;
    --ink-4: #a39a88;
    --rule: #c8bfa8;
    --rule-2: #d8cfb8;
    --accent: oklch(0.62 0.14 55);   /* amber/ochre */
    --accent-2: oklch(0.52 0.09 160); /* sage */
    --accent-3: oklch(0.48 0.18 25);  /* rust */
    --warn: oklch(0.68 0.15 75);
    --good: oklch(0.55 0.10 150);
    --bad: oklch(0.50 0.19 28);
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
    --pad: 14px;
    --row: 22px;
  }
  [data-theme="dark"] {
    --bg: #141210;
    --bg-2: #0d0b09;
    --panel: #1c1814;
    --panel-2: #23201b;
    --ink: #ece6d6;
    --ink-2: #c4bca8;
    --ink-3: #8a8270;
    --ink-4: #58523f;
    --rule: #2e2a22;
    --rule-2: #3a342a;
    --accent: oklch(0.75 0.13 65);
    --accent-2: oklch(0.70 0.09 160);
    --accent-3: oklch(0.68 0.18 28);
  }
  [data-density="compact"] {
    --pad: 10px;
    --row: 19px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.45;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 16px 16px 96px;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(0,0,0,0.015), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 27px, rgba(0,0,0,0.012) 27px 28px);
  }
  [data-theme="dark"] body {
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255,255,255,0.02), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 27px, rgba(255,255,255,0.015) 27px 28px);
  }
  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  #root { max-width: 1680px; margin: 0 auto; }

  /* Reusable primitives */
  .panel {
    background: var(--panel);
    border: 1px solid var(--rule);
    position: relative;
  }
  .panel-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px var(--pad);
    border-bottom: 1px solid var(--rule);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--panel-2);
  }
  .panel-title .t-left { display: flex; align-items: center; gap: 10px; }
  .panel-title .t-right { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--ink-4); }
  .panel-body { padding: var(--pad); }
  .hairline { border-top: 1px dashed var(--rule); margin: 6px 0; }
  .kbd {
    display: inline-block;
    padding: 1px 5px;
    font-size: 10px;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-3);
    border-radius: 2px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-2);
  }
  .chip.amber { color: var(--accent); border-color: var(--accent); }
  .chip.sage  { color: var(--accent-2); border-color: var(--accent-2); }
  .chip.rust  { color: var(--accent-3); border-color: var(--accent-3); }
  .chip.ghost { color: var(--ink-4); }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-3); display: inline-block;
  }
  .dot.pulse { animation: pulse 1.6s ease-in-out infinite; }
  .dot.green { background: var(--good); }
  .dot.amber { background: var(--accent); }
  .dot.rust  { background: var(--accent-3); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); opacity: 1; }
    50%     { box-shadow: 0 0 0 4px rgba(0,0,0,0); opacity: 0.45; }
  }
  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); font-style: italic; }
  .num-xl { font-family: var(--serif); font-size: 44px; line-height: 1; font-style: italic; letter-spacing: -0.01em; }
  .num-lg { font-family: var(--mono); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .num-md { font-family: var(--mono); font-size: 16px; font-weight: 600; }
  .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

  /* layout */
  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    padding: 10px 14px;
    border: 1px solid var(--rule);
    background: var(--panel);
    margin-bottom: 10px;
  }
  .grid-main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 10px;
  }
  .col-wide { grid-column: 1 / span 2; }

  /* buttons/inputs */
  button, .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-2);
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 5px 10px;
    cursor: pointer;
    transition: all .14s ease;
  }
  button:hover, .btn:hover {
    border-color: var(--ink-2);
    color: var(--ink);
  }
  button.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  [data-theme="dark"] button.primary {
    background: var(--accent);
    color: var(--bg-2);
    border-color: var(--accent);
  }
  input, textarea, select {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 6px 8px;
    outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }

  /* sparkline bars */
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
  .bars .b { flex: 1; background: var(--ink-4); opacity: 0.6; }
  .bars .b.on { background: var(--accent); opacity: 1; }

  /* table */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th, .tbl td { text-align: left; padding: 5px 8px; border-bottom: 1px dotted var(--rule); font-size: 12px; }
  .tbl th { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .tbl tr.sel td { background: var(--panel-2); }
  .tbl tr:hover td { background: var(--panel-2); cursor: pointer; }

  /* animations */
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; } }

  .caret::after { content: "_"; animation: blink 1s step-end infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }

  /* tweaks panel */
  .tweaks {
    position: fixed;
    bottom: 16px; right: 16px;
    background: var(--panel);
    border: 1px solid var(--ink-2);
    padding: 12px;
    width: 260px;
    font-size: 11px;
    z-index: 100;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .tweaks h4 { margin: 0 0 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .tweaks label { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
  .tweaks input[type=checkbox] { accent-color: var(--accent); }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--ink-2);
    max-width: 640px;
    width: 100%;
    max-height: 80vh;
    overflow: auto;
    box-shadow: 6px 6px 0 var(--ink);
  }

  /* ascii border accent */
  .ascii-corner { color: var(--ink-4); font-family: var(--mono); }

  /* ring chart */
  .ring-wrap { position: relative; width: 96px; height: 96px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-wrap .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }
</style>
</head>
<body data-theme="light" data-density="comfortable">
  <div id="root"></div>

  <!-- React / Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="llmsp/data.jsx"></script>
  <script type="text/babel" src="llmsp/primitives.jsx"></script>
  <script type="text/babel" src="llmsp/live.jsx"></script>
  <script type="text/babel" src="llmsp/panels-top.jsx"></script>
  <script type="text/babel" src="llmsp/panels-council.jsx"></script>
  <script type="text/babel" src="llmsp/panels-bottom.jsx"></script>
  <script type="text/babel" src="llmsp/settings.jsx"></script>
  <script type="text/babel" src="llmsp/app.jsx"></script>
</body>
</html>
